name: github-release

on:
  workflow_call:
    secrets:
      gh-token:
        required: true
    outputs:
      semver:
        value: ${{ jobs.release.outputs.semver }}
        description: semantic versioning from release branch name
jobs:
  release:
    name: "Github Tag & Release"
    runs-on: self-hosted
    outputs:
      semver: ${{ steps.vars-step.outputs.semver }}
    steps:
      - name: Retrieve semver from release branch
        shell: bash
        id: vars-step
        # Pass the commit message via env, never inline ${{ }} into the script:
        # raw interpolation lets backticks/parens/quotes in a message run as shell.
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          cd "$GITHUB_WORKSPACE"
          SEMVER=$(printf '%s\n' "$HEAD_COMMIT_MESSAGE" | grep -i "release-" | cut -d '-' -f 2 | head -n 1)
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.gh-token }}"
          automatic_release_tag: "${{ steps.vars-step.outputs.semver }}"
          prerelease: false
          draft: false
          title: "Release ${{ steps.vars-step.outputs.semver }}"
